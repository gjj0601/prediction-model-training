data:
  path: "C:/Users/18761/Desktop/SCI/nutrient/nutrient/prediction_dataset_knuppel_T2D_alt.csv"
  id_col: "n_eid"
  time_col: "fu_time"
  event_col: "event"

  feature_sets:
    # Model 1: QDiabetes-like clinical base + diet score
    base:
      - "Age"
      - "Sex"
      - "BMI"
      - "Ethnic"
      - "Smoking_S3"
      - "Index"
      - "fh_dm_any"
      - "Hypertension"
      - "CVD_BL"
      - "Drug_M_lip"


    # Model 2: base + routine biomarkers
    base_plus_protein:
      base_ref: "base"
      add:
        - "DBP"
        - "A1C"
        - "LDL_direct"
        - "TG"
        - "CRP"
        - "GGT"
        - "eGFRcr"

    # Model 3: base + routine biomarkers + diet-profile log-ratios
    base_plus_aip:
      base_ref: "base_plus_protein"
      add:
        - "lr_D1"
        - "lr_D10"
        - "lr_D13"
        - "lr_D3"
        - "lr_D7"
        - "lr_D9"

  preprocessing:
    nominal:
      - "Sex"
      - "Ethnic"
      - "Smoking_S3"
      - "Hypertension"
      - "CVD_BL"
      - "Drug_M_lip"
      - "fh_dm_any"

train:
  test_size: 0.30
  val_size: 0.142857
  use_validation: true

  test_random_state: 101

  split_seeds:
    base: 101
    base_plus_protein: 101
    base_plus_aip: 101

  random_state: 101

  model_params:
    l1_ratio: 0.1
    n_alphas: 100
    alpha_min_ratio: 0.001
    max_iter: 100000
    tol: 1.0e-6

eval:
  horizons_years: [10]

  auc_time_grid:
    start: 10
    stop: 10.1
    step: 1

  auc_ci:
    enabled: false
    n_boot: 0
    seed: 2026

interpretability:
  enabled: false
  model_key: "base_plus_aip"
  top_k: 15
  background: "train_pool"
  explain: "test"

outputs:
  figures_dir: "outputs/figures"
  tables_dir: "outputs/tables"